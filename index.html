<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>リアルタイム多言語翻訳</title>
  <style>
    :root {
      --bg: #000;
      --panel: #111827;
      --button: #1f2937;
      --active: #ffffff;
      --text: #ffffff;
      --muted: #9ca3af;
      --green: #22c55e;
      --red: #ef4444;
      --border: #374151;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .screen {
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .display {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100%;
      background: #000;
    }

    .box {
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      word-break: break-word;
    }

    .box:first-child {
      border-right: 2px solid #333;
    }

    .label {
      color: var(--muted);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 28px;
    }

    #sourceText {
      font-size: 56px;
      line-height: 1.3;
      font-weight: 750;
      color: #e5e7eb;
    }

    #translatedText {
      font-size: 68px;
      line-height: 1.25;
      font-weight: 850;
      color: #ffffff;
    }

    .controlPanel {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .languageButtons {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 800;
      font-size: 16px;
      padding: 14px 8px;
      background: var(--button);
      cursor: pointer;
    }

    .languageButtons button.active {
      background: var(--active);
      color: #111827;
    }

    .mainButtons {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 8px;
    }

    #startBtn {
      background: var(--green);
      font-size: 22px;
    }

    #startBtn.recording {
      background: var(--red);
      animation: pulse 1s infinite;
    }

    .stop {
      background: var(--red);
    }

    .fullscreen {
      background: #374151;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 rgba(239,68,68,0.5); }
      50% { box-shadow: 0 0 26px rgba(239,68,68,0.7); }
      100% { box-shadow: 0 0 0 rgba(239,68,68,0.5); }
    }

    body.fullscreenMode .controlPanel {
      display: none;
    }

    body.fullscreenMode .screen {
      grid-template-rows: 1fr;
    }

    @media screen and (orientation: portrait) {
      .display {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }

      .box:first-child {
        border-right: none;
        border-bottom: 2px solid #333;
      }

      .box {
        padding: 28px;
      }

      .label {
        font-size: 22px;
        margin-bottom: 18px;
      }

      #sourceText {
        font-size: 42px;
      }

      #translatedText {
        font-size: 52px;
      }

      .languageButtons {
        grid-template-columns: repeat(3, 1fr);
      }

      .mainButtons {
        grid-template-columns: 1fr 1fr;
      }

      .fullscreen {
        grid-column: span 2;
      }
    }

    @media screen and (max-width: 700px) {
      #sourceText {
        font-size: 34px;
      }

      #translatedText {
        font-size: 42px;
      }

      button {
        font-size: 14px;
        padding: 12px 6px;
      }

      #startBtn {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="screen">
    <main class="display">
      <section class="box">
        <div class="label">日本語</div>
        <div id="sourceText">開始ボタンを押して話してください</div>
      </section>

      <section class="box">
        <div class="label" id="targetLabel">ベトナム語</div>
        <div id="translatedText">翻訳結果が表示されます</div>
      </section>
    </main>

    <section class="controlPanel">
      <div class="languageButtons">
        <button class="langBtn active" data-lang="vi">ベトナム語</button>
        <button class="langBtn" data-lang="en">英語</button>
        <button class="langBtn" data-lang="es">スペイン語</button>
        <button class="langBtn" data-lang="pt">ポルトガル語</button>
        <button class="langBtn" data-lang="zh-CN">中国語</button>
        <button class="langBtn" data-lang="id">インドネシア語</button>
      </div>

      <div class="mainButtons">
        <button id="startBtn" onclick="startMic()">🎙 リアルタイム開始</button>
        <button class="stop" onclick="stopMic()">停止</button>
        <button class="fullscreen" onclick="toggleFullscreen()">全画面</button>
      </div>

      <div class="status" id="status">待機中</div>
    </section>
  </div>

  <script>
    /*
      ここだけ変更してください。
      例：
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxxxxxxx/exec";
    */
    const GAS_URL = "ここにGASのWebアプリURLを入れてください";

    let targetLang = "vi";
    let recognition = null;
    let recognizing = false;
    let lastFinalText = "";
    let lastTranslateAt = 0;

    const langNames = {
      "vi": "ベトナム語",
      "en": "英語",
      "es": "スペイン語",
      "pt": "ポルトガル語",
      "zh-CN": "中国語",
      "id": "インドネシア語"
    };

    const sourceText = document.getElementById("sourceText");
    const translatedText = document.getElementById("translatedText");
    const targetLabel = document.getElementById("targetLabel");
    const statusBox = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");

    document.querySelectorAll(".langBtn").forEach(button => {
      button.addEventListener("click", () => {
        targetLang = button.dataset.lang;

        document.querySelectorAll(".langBtn").forEach(btn => {
          btn.classList.remove("active");
        });

        button.classList.add("active");
        targetLabel.textContent = langNames[targetLang];
        setStatus("翻訳先：" + langNames[targetLang]);
      });
    });

    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        setStatus("このブラウザは音声入力に対応していません。iPadのSafari、またはChromeで試してください。");
        return null;
      }

      const rec = new SpeechRecognition();
      rec.lang = "ja-JP";
      rec.continuous = true;
      rec.interimResults = true;

      rec.onstart = function() {
        recognizing = true;
        startBtn.classList.add("recording");
        startBtn.textContent = "🎙 入力中";
        setStatus("音声入力中");
      };

      rec.onend = function() {
        recognizing = false;
        startBtn.classList.remove("recording");
        startBtn.textContent = "🎙 リアルタイム開始";
        setStatus("停止中");
      };

      rec.onerror = function(event) {
        setStatus("音声入力エラー：" + event.error);
      };

      rec.onresult = function(event) {
        let interimText = "";
        let finalText = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;

          if (event.results[i].isFinal) {
            finalText += transcript;
          } else {
            interimText += transcript;
          }
        }

        if (interimText) {
          sourceText.textContent = interimText;
          translatedText.textContent = "翻訳中...";
        }

        if (finalText) {
          finalText = finalText.trim();

          if (!finalText || finalText === lastFinalText) return;

          lastFinalText = finalText;
          sourceText.textContent = finalText;

          const now = Date.now();
          if (now - lastTranslateAt > 500) {
            lastTranslateAt = now;
            translateText(finalText);
          }
        }
      };

      return rec;
    }

    function startMic() {
      if (!recognition) {
        recognition = setupSpeechRecognition();
      }

      if (!recognition) return;

      try {
        if (!recognizing) recognition.start();
      } catch (err) {
        setStatus("音声開始エラー：" + err.message);
      }
    }

    function stopMic() {
      if (recognition && recognizing) {
        recognition.stop();
      }
    }

    function translateText(text) {
      if (!GAS_URL || GAS_URL.includes("ここにGAS")) {
        translatedText.textContent = "GAS_URLを設定してください";
        setStatus("GAS_URLを設定してください");
        return;
      }

      translatedText.textContent = "翻訳中...";
      setStatus("翻訳中");

      const callbackName = "callback_" + Date.now() + "_" + Math.floor(Math.random() * 10000);

      window[callbackName] = function(data) {
        try {
          if (data.error) {
            translatedText.textContent = "翻訳エラー";
            setStatus("翻訳エラー：" + data.error);
            return;
          }

          translatedText.textContent = data.translated || "翻訳結果なし";
          setStatus("翻訳完了");

        } finally {
          delete window[callbackName];
          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      };

      const script = document.createElement("script");

      script.onerror = function() {
        translatedText.textContent = "通信エラー";
        setStatus("通信エラー：GASのURLまたは公開設定を確認してください");
        delete window[callbackName];
        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }
      };

      script.src =
        GAS_URL +
        "?text=" + encodeURIComponent(text) +
        "&target=" + encodeURIComponent(targetLang) +
        "&callback=" + callbackName +
        "&t=" + Date.now();

      document.body.appendChild(script);
    }

    function toggleFullscreen() {
      document.body.classList.toggle("fullscreenMode");

      const doc = document.documentElement;

      if (!document.fullscreenElement) {
        if (doc.requestFullscreen) {
          doc.requestFullscreen().catch(() => {});
        } else if (doc.webkitRequestFullscreen) {
          doc.webkitRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    }

    document.addEventListener("fullscreenchange", function() {
      if (!document.fullscreenElement) {
        document.body.classList.remove("fullscreenMode");
      }
    });

    document.addEventListener("webkitfullscreenchange", function() {
      if (!document.webkitFullscreenElement) {
        document.body.classList.remove("fullscreenMode");
      }
    });

    function setStatus(message) {
      statusBox.textContent = message;
    }
  </script>
</body>
</html>

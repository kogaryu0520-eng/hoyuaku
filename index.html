<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>鉄骨工場リアルタイム翻訳 V2</title>
  <style>
    :root {
      --bg:#000;
      --panel:#111827;
      --button:#1f2937;
      --active:#fff;
      --text:#fff;
      --muted:#9ca3af;
      --green:#22c55e;
      --red:#ef4444;
      --border:#374151;
    }

    * {
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    body {
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    .screen {
      height:100vh;
      display:grid;
      grid-template-rows:1fr auto;
    }

    .display {
      display:grid;
      grid-template-rows:2fr 1fr;
      height:100%;
      background:#000;
    }

    .box {
      padding:28px 5vw;
      display:flex;
      flex-direction:column;
      justify-content:center;
      text-align:center;
      word-break:break-word;
      overflow:hidden;
    }

    .translatedBox {
      border-bottom:2px solid #333;
    }

    .label {
      color:var(--muted);
      font-size:24px;
      font-weight:800;
      letter-spacing:.08em;
      margin-bottom:18px;
      flex-shrink:0;
    }

    #translatedText {
      font-size:clamp(44px,8vw,96px);
      line-height:1.18;
      font-weight:850;
      overflow-wrap:anywhere;
    }

    #sourceText {
      font-size:clamp(28px,5.2vw,58px);
      line-height:1.3;
      font-weight:750;
      color:#e5e7eb;
      overflow-wrap:anywhere;
    }

    #translatedText.compact { font-size:clamp(34px,6.2vw,72px); }
    #translatedText.tiny { font-size:clamp(26px,4.8vw,54px); line-height:1.15; }
    #sourceText.compact { font-size:clamp(22px,4.2vw,44px); }
    #sourceText.tiny { font-size:clamp(18px,3.2vw,34px); line-height:1.22; }

    .controlPanel {
      background:var(--panel);
      border-top:1px solid var(--border);
      padding:10px;
      display:grid;
      gap:10px;
    }

    .languageButtons {
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:8px;
    }

    button {
      border:none;
      border-radius:12px;
      color:#fff;
      font-weight:800;
      font-size:16px;
      padding:14px 8px;
      background:var(--button);
      cursor:pointer;
    }

    .languageButtons button.active {
      background:var(--active);
      color:#111827;
    }

    .mainButtons {
      display:grid;
      grid-template-columns:2fr 1fr 1fr;
      gap:8px;
    }

    #startBtn {
      background:var(--green);
      font-size:22px;
    }

    #startBtn.recording {
      background:var(--red);
      animation:pulse 1s infinite;
    }

    .stop { background:var(--red); }
    .fullscreen { background:#374151; }

    .status {
      color:var(--muted);
      font-size:14px;
      text-align:center;
      min-height:20px;
    }

    #exitFullscreenBtn {
      display:none;
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:9999;
      background:rgba(255,255,255,.92);
      color:#111827;
      border:none;
      border-radius:999px;
      font-weight:900;
      font-size:20px;
      padding:16px 24px;
      box-shadow:0 8px 28px rgba(0,0,0,.45);
    }

    body.fullscreenMode #exitFullscreenBtn {
      display:block;
    }

    body.fullscreenMode .controlPanel {
      display:none;
    }

    body.fullscreenMode .screen {
      grid-template-rows:1fr;
    }

    @keyframes pulse {
      0% { box-shadow:0 0 0 rgba(239,68,68,.5); }
      50% { box-shadow:0 0 26px rgba(239,68,68,.7); }
      100% { box-shadow:0 0 0 rgba(239,68,68,.5); }
    }

    @media screen and (orientation:portrait) {
      .box { padding:24px 5vw; }
      .label { font-size:22px; margin-bottom:14px; }
      #sourceText { font-size:clamp(26px,8vw,46px); }
      #translatedText { font-size:clamp(40px,11vw,72px); }
      .languageButtons { grid-template-columns:repeat(3,1fr); }
      .mainButtons { grid-template-columns:1fr 1fr; }
      .fullscreen { grid-column:span 2; }
    }

    @media screen and (max-width:700px) {
      button { font-size:14px; padding:12px 6px; }
      #startBtn { font-size:18px; }
    }
  </style>
</head>

<body>
  <button id="exitFullscreenBtn" onclick="exitFullscreenMode()">戻る</button>

  <div class="screen">
    <main class="display">
      <section class="box translatedBox">
        <div class="label" id="targetLabel">ベトナム語</div>
        <div id="translatedText">翻訳結果が表示されます</div>
      </section>

      <section class="box sourceBox">
        <div class="label">日本語</div>
        <div id="sourceText">開始ボタンを押して話してください</div>
      </section>
    </main>

    <section class="controlPanel">
      <div class="languageButtons">
        <button class="langBtn active" data-lang="vi">ベトナム語</button>
        <button class="langBtn" data-lang="en">英語</button>
        <button class="langBtn" data-lang="es">スペイン語</button>
        <button class="langBtn" data-lang="pt">ポルトガル語</button>
        <button class="langBtn" data-lang="zh-CN">中国語</button>
        <button class="langBtn" data-lang="id">インドネシア語</button>
      </div>

      <div class="mainButtons">
        <button id="startBtn" onclick="startMic()">🎙 リアルタイム開始</button>
        <button class="stop" onclick="stopMic()">停止</button>
        <button class="fullscreen" onclick="toggleFullscreen()">全画面</button>
      </div>

      <div class="status" id="status">待機中</div>
    </section>
  </div>

  <script>
    /*
      ここをGASのWebアプリURLに変更してください。
      例：
      const GAS_URL = "https://script.google.com/macros/s/AKfycbwVnFVFrcm0opKSaKCoe-02wH1nisKb7eMAdbSklkcpw1XFADcd8rv7YMefE1mtwJ2C/exec";
    */
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwVnFVFrcm0opKSaKCoe-02wH1nisKb7eMAdbSklkcpw1XFADcd8rv7YMefE1mtwJ2C/exec";

    window.onerror = function(message, source, lineno, colno, error) {
      var status = document.getElementById("status");
      if (status) {
        status.textContent = "JSエラー：" + message + " / " + lineno;
      }
      return false;
    };

    let targetLang = "vi";
    let recognition = null;
    let recognizing = false;
    let desiredRunning = false;
    let lastFinalText = "";
    let lastRequestId = 0;
    let lastInterimAt = 0;
    let restartTimer = null;

    const TRANSLATION_CACHE = new Map();

    const langNames = {
      "vi":"ベトナム語",
      "en":"英語",
      "es":"スペイン語",
      "pt":"ポルトガル語",
      "zh-CN":"中国語",
      "id":"インドネシア語"
    };

    const sourceText = document.getElementById("sourceText");
    const translatedText = document.getElementById("translatedText");
    const targetLabel = document.getElementById("targetLabel");
    const statusBox = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");

    /*
      軽量な音声誤認識補正。
      重要語だけに絞る。巨大辞書の全走査はiPadで遅くなるため使わない。
    */
    const SPEECH_CORRECTIONS = [
      ["開栓", "開先"],
      ["海鮮", "開先"],
      ["改選", "開先"],
      ["完全溶け込み", "完全溶込み"],
      ["完全溶けこみ", "完全溶込み"],
      ["スプライズ", "スプライス"],
      ["スプライスプレイト", "スプライスプレート"],
      ["ダイヤフラム", "ダイアフラム"],
      ["エンドタグ", "エンドタブ"],
      ["ハイテンボルト", "高力ボルト"],
      ["針", "梁"],
      ["張り", "梁"],
      ["橋", "柱"],
      ["養成", "溶接"],
      ["美ード", "ビード"],
      ["ビート", "ビード"],
      ["ショートビート", "ショートビード"],
      ["朝れい", "朝礼"],
      ["条例", "朝礼"],
      ["今日令", "朝礼"],
      ["幽霊", "夕礼"],
      ["ユーティー", "UT"],
      ["エムティー", "MT"],
      ["ピーティー", "PT"],
      ["おんぱ", "超音波"],
      ["超音波たんしょう", "超音波探傷"],
      ["磁粉たんしょう", "磁粉探傷"],
      ["たまかけ", "玉掛け"],
      ["かいしゃくロープ", "介錯ロープ"],
      ["解釈ロープ", "介錯ロープ"],
      ["親づなフック", "親綱フック"],
      ["エスエヌ490", "SN490"],
      ["エスエー440", "SA440"],
      ["エスエス400", "SS400"],
      ["ビーエイチ", "BH"],
      ["ビー エイチ", "BH"],
      ["ビーシーアール", "BCR"],
      ["エスティーケーアール", "STKR"],
      ["Hこう", "H鋼"],
      ["エイチ鋼", "H鋼"]
    ];

    /*
      翻訳固定辞書。
      ここに入っている語はGoogle翻訳に崩されず、各言語の固定訳で表示される。
    */
    const TERM_TRANSLATIONS = {
      "スプライスプレート": {"vi":"bản nối splice","en":"splice plate","es":"placa de empalme","pt":"placa de emenda","zh-CN":"拼接板","id":"pelat sambungan splice"},
      "スプライス": {"vi":"bản nối splice","en":"splice plate","es":"placa de empalme","pt":"placa de emenda","zh-CN":"拼接板","id":"pelat sambungan splice"},
      "ダイアフラム": {"vi":"tấm diaphragm","en":"diaphragm plate","es":"placa diafragma","pt":"placa diafragma","zh-CN":"隔板","id":"pelat diafragma"},
      "梁": {"vi":"dầm thép","en":"steel beam","es":"viga de acero","pt":"viga de aço","zh-CN":"钢梁","id":"balok baja"},
      "柱": {"vi":"cột thép","en":"steel column","es":"columna de acero","pt":"coluna de aço","zh-CN":"钢柱","id":"kolom baja"},
      "大梁": {"vi":"dầm chính","en":"main beam","es":"viga principal","pt":"viga principal","zh-CN":"主梁","id":"balok utama"},
      "小梁": {"vi":"dầm phụ","en":"secondary beam","es":"viga secundaria","pt":"viga secundária","zh-CN":"次梁","id":"balok sekunder"},
      "開先加工": {"vi":"gia công mép vát hàn","en":"weld groove preparation","es":"preparación del bisel de soldadura","pt":"preparação do chanfro de soldagem","zh-CN":"焊接坡口加工","id":"persiapan alur las"},
      "開先": {"vi":"mép vát hàn","en":"weld groove","es":"bisel de soldadura","pt":"chanfro de soldagem","zh-CN":"焊接坡口","id":"alur las"},
      "完全溶込み": {"vi":"hàn ngấu hoàn toàn","en":"complete joint penetration weld","es":"soldadura de penetración completa","pt":"solda de penetração total","zh-CN":"全熔透焊","id":"las penetrasi penuh"},
      "完全溶込": {"vi":"hàn ngấu hoàn toàn","en":"complete joint penetration weld","es":"soldadura de penetración completa","pt":"solda de penetração total","zh-CN":"全熔透焊","id":"las penetrasi penuh"},
      "隅肉溶接": {"vi":"hàn góc","en":"fillet weld","es":"soldadura de filete","pt":"solda de filete","zh-CN":"角焊缝","id":"las fillet"},
      "隅肉": {"vi":"hàn góc","en":"fillet weld","es":"soldadura de filete","pt":"solda de filete","zh-CN":"角焊","id":"las fillet"},
      "仮付け": {"vi":"hàn đính tạm","en":"tack welding","es":"soldadura de puntos provisional","pt":"solda provisória","zh-CN":"点焊固定","id":"las titik sementara"},
      "本溶接": {"vi":"hàn chính thức","en":"final welding","es":"soldadura final","pt":"soldagem final","zh-CN":"正式焊接","id":"pengelasan akhir"},
      "裏当て": {"vi":"thanh lót mặt sau","en":"backing bar","es":"barra de respaldo","pt":"barra de apoio","zh-CN":"衬垫板","id":"batang backing"},
      "エンドタブ": {"vi":"tấm tab đầu mối hàn","en":"weld end tab","es":"placa terminal de soldadura","pt":"aba final de soldagem","zh-CN":"引弧板","id":"tab ujung las"},
      "ガセットプレート": {"vi":"bản mã gusset","en":"gusset plate","es":"placa gusset","pt":"chapa gusset","zh-CN":"节点板","id":"pelat gusset"},
      "ガセット": {"vi":"bản mã gusset","en":"gusset plate","es":"placa gusset","pt":"chapa gusset","zh-CN":"节点板","id":"pelat gusset"},
      "高力ボルト": {"vi":"bu lông cường độ cao","en":"high-strength bolt","es":"perno de alta resistencia","pt":"parafuso de alta resistência","zh-CN":"高强螺栓","id":"baut mutu tinggi"},
      "H鋼": {"vi":"thép hình H","en":"H-beam","es":"viga H","pt":"viga H","zh-CN":"H型钢","id":"baja profil H"},
      "BH": {"vi":"BH","en":"built-up H-beam","es":"viga H armada","pt":"viga H montada","zh-CN":"焊接H型钢","id":"balok H built-up"},
      "コラム": {"vi":"ống thép hộp cột","en":"box column","es":"columna tubular cuadrada","pt":"coluna tubular quadrada","zh-CN":"箱形柱","id":"kolom kotak baja"},
      "角パイプ": {"vi":"ống thép hộp vuông","en":"square steel tube","es":"tubo cuadrado de acero","pt":"tubo quadrado de aço","zh-CN":"方钢管","id":"pipa kotak baja"},
      "ショットブラスト": {"vi":"phun bi làm sạch","en":"shot blasting","es":"granallado","pt":"jateamento com granalha","zh-CN":"抛丸处理","id":"shot blasting"},
      "ショット": {"vi":"phun bi","en":"shot blasting","es":"granallado","pt":"jateamento","zh-CN":"抛丸","id":"shot blasting"},
      "UT": {"vi":"kiểm tra siêu âm UT","en":"UT ultrasonic testing","es":"ensayo ultrasónico UT","pt":"ensaio ultrassônico UT","zh-CN":"UT超声波探伤","id":"pengujian ultrasonik UT"},
      "超音波探傷": {"vi":"kiểm tra siêu âm","en":"ultrasonic testing","es":"ensayo ultrasónico","pt":"ensaio ultrassônico","zh-CN":"超声波探伤","id":"pengujian ultrasonik"},
      "MT": {"vi":"kiểm tra từ tính MT","en":"MT magnetic particle testing","es":"ensayo de partículas magnéticas MT","pt":"ensaio por partículas magnéticas MT","zh-CN":"MT磁粉探伤","id":"pengujian partikel magnetik MT"},
      "PT": {"vi":"kiểm tra thẩm thấu PT","en":"PT penetrant testing","es":"ensayo por líquidos penetrantes PT","pt":"ensaio por líquido penetrante PT","zh-CN":"PT渗透探伤","id":"pengujian penetran PT"},
      "建方": {"vi":"lắp dựng kết cấu thép","en":"steel erection","es":"montaje de estructura de acero","pt":"montagem da estrutura de aço","zh-CN":"钢结构安装","id":"ereksi struktur baja"},
      "建入れ": {"vi":"kiểm tra độ thẳng khi lắp dựng","en":"plumb adjustment","es":"ajuste de verticalidad","pt":"ajuste de prumo","zh-CN":"垂直度调整","id":"penyetelan ketegakan"},
      "玉掛け": {"vi":"móc cáp cẩu","en":"slinging work","es":"trabajo de eslingado","pt":"trabalho de lingamento","zh-CN":"吊装挂钩作业","id":"pekerjaan rigging"},
      "吊荷": {"vi":"tải đang treo","en":"suspended load","es":"carga suspendida","pt":"carga suspensa","zh-CN":"吊载","id":"beban tergantung"},
      "介錯ロープ": {"vi":"dây điều hướng tải","en":"tag line","es":"cuerda guía","pt":"corda guia","zh-CN":"牵引绳","id":"tali pengarah"},
      "親綱フック": {"vi":"móc dây an toàn chính","en":"lifeline hook","es":"gancho de línea de vida","pt":"gancho de linha de vida","zh-CN":"安全母绳挂钩","id":"kait lifeline"},
      "フルハーネス": {"vi":"dây đai an toàn toàn thân","en":"full-body harness","es":"arnés de cuerpo completo","pt":"cinturão tipo paraquedista","zh-CN":"全身式安全带","id":"full body harness"},
      "安全通路": {"vi":"lối đi an toàn","en":"safe walkway","es":"pasillo seguro","pt":"passagem segura","zh-CN":"安全通道","id":"jalur aman"},
      "作業手順書": {"vi":"quy trình làm việc","en":"work procedure","es":"procedimiento de trabajo","pt":"procedimento de trabalho","zh-CN":"作业指导书","id":"prosedur kerja"},
      "出来高": {"vi":"khối lượng hoàn thành","en":"work progress quantity","es":"cantidad de avance","pt":"quantidade produzida","zh-CN":"完成工程量","id":"jumlah hasil pekerjaan"}
    };

    const TERM_KEYS = Object.keys(TERM_TRANSLATIONS).sort((a,b) => b.length - a.length);

    document.querySelectorAll(".langBtn").forEach(button => {
      button.addEventListener("click", () => {
        targetLang = button.dataset.lang;
        document.querySelectorAll(".langBtn").forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        targetLabel.textContent = langNames[targetLang];
        setStatus("翻訳先：" + langNames[targetLang]);
      });
    });

    function correctJapaneseText(text) {
      let result = String(text || "");
      for (const pair of SPEECH_CORRECTIONS) {
        if (result.includes(pair[0])) {
          result = result.split(pair[0]).join(pair[1]);
        }
      }
      return result;
    }

    function applyTermPlaceholders(text) {
      let protectedText = String(text || "");
      const replacements = [];

      TERM_KEYS.forEach((term, i) => {
        if (protectedText.includes(term)) {
          const placeholder = " KOGATERM" + i + " ";
          protectedText = protectedText.split(term).join(placeholder);
          replacements.push({ placeholder, term });
        }
      });

      return { text: protectedText, replacements };
    }

    function restoreTerms(translated, replacements) {
      let result = String(translated || "");

      replacements.forEach(item => {
        const termMap = TERM_TRANSLATIONS[item.term] || {};
        const fixed = termMap[targetLang] || item.term;
        const raw = item.placeholder.trim();

        [
          raw,
          raw.toLowerCase(),
          item.placeholder,
          item.placeholder.toLowerCase(),
          raw.replace("KOGATERM", "KOGA TERM"),
          raw.toLowerCase().replace("kogaterm", "koga term")
        ].forEach(p => {
          result = result.split(p).join(fixed);
        });
      });

      return result.replace(/\s+/g, " ").trim();
    }

    function fitDisplayText() {
      const s = sourceText.textContent.length;
      const t = translatedText.textContent.length;

      sourceText.classList.remove("compact","tiny");
      translatedText.classList.remove("compact","tiny");

      if (s > 45) sourceText.classList.add("compact");
      if (s > 90) sourceText.classList.add("tiny");

      if (t > 55) translatedText.classList.add("compact");
      if (t > 110) translatedText.classList.add("tiny");
    }

    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        setStatus("このブラウザは音声入力に対応していません。iPadのSafari、またはChromeで試してください。");
        return null;
      }

      let rec;
      try {
        rec = new SpeechRecognition();
      } catch (e) {
        setStatus("音声認識を開始できません：" + e.message);
        return null;
      }

      rec.lang = "ja-JP";
      rec.continuous = true;
      rec.interimResults = true;

      rec.onstart = function() {
        recognizing = true;
        startBtn.classList.add("recording");
        startBtn.textContent = "🎙 入力中";
        setStatus("音声入力中");
      };

      rec.onend = function() {
        recognizing = false;

        if (desiredRunning) {
          setStatus("自動再開中...");
          clearTimeout(restartTimer);
          restartTimer = setTimeout(() => {
            try { rec.start(); } catch(e) { setStatus("再開待機中"); }
          }, 450);
          return;
        }

        startBtn.classList.remove("recording");
        startBtn.textContent = "🎙 リアルタイム開始";
        setStatus("停止中");
      };

      rec.onerror = function(event) {
        if (event.error === "no-speech") {
          setStatus("音声待機中");
          return;
        }
        setStatus("音声入力エラー：" + event.error);
      };

      rec.onresult = function(event) {
        let interimText = "";
        let finalText = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalText += transcript;
          } else {
            interimText += transcript;
          }
        }

        if (interimText) {
          const now = Date.now();
          if (now - lastInterimAt > 160) {
            lastInterimAt = now;
            sourceText.textContent = correctJapaneseText(interimText);
            fitDisplayText();
          }
        }

        if (finalText) {
          finalText = correctJapaneseText(finalText.trim());
          if (!finalText || finalText === lastFinalText) return;

          lastFinalText = finalText;
          sourceText.textContent = finalText;
          fitDisplayText();
          translateText(finalText);
        }
      };

      return rec;
    }

    function startMic() {
      setStatus("開始ボタンが押されました");
      desiredRunning = true;

      if (!recognition) {
        recognition = setupSpeechRecognition();
      }

      if (!recognition) return;

      try {
        if (!recognizing) recognition.start();
      } catch (err) {
        setStatus("音声開始エラー：" + err.message);
      }
    }

    function stopMic() {
      desiredRunning = false;
      clearTimeout(restartTimer);

      if (recognition && recognizing) {
        recognition.stop();
      } else {
        startBtn.classList.remove("recording");
        startBtn.textContent = "🎙 リアルタイム開始";
        setStatus("停止中");
      }
    }

    function translateText(text) {
      if (!GAS_URL || GAS_URL.includes("ここにGAS")) {
        translatedText.textContent = "GAS_URLを設定してください";
        setStatus("GAS_URLを設定してください");
        return;
      }

      const cacheKey = targetLang + "::" + text;

      if (TRANSLATION_CACHE.has(cacheKey)) {
        translatedText.textContent = TRANSLATION_CACHE.get(cacheKey);
        fitDisplayText();
        setStatus("キャッシュ表示");
        return;
      }

      const protectedData = applyTermPlaceholders(text);
      const textForTranslate = protectedData.text;
      const requestId = ++lastRequestId;
      const callbackName = "callback_" + Date.now() + "_" + Math.floor(Math.random() * 10000);

      translatedText.textContent = "翻訳中...";
      fitDisplayText();
      setStatus("翻訳中");

      const script = document.createElement("script");

      window[callbackName] = function(data) {
        try {
          if (requestId !== lastRequestId) return;

          if (!data || data.error) {
            translatedText.textContent = "翻訳エラー";
            setStatus(data && data.error ? "翻訳エラー：" + data.error : "翻訳エラー");
            return;
          }

          const restored = restoreTerms(data.translated || "", protectedData.replacements);
          const finalText = restored || "翻訳結果なし";

          TRANSLATION_CACHE.set(cacheKey, finalText);

          translatedText.textContent = finalText;
          fitDisplayText();
          setStatus(data.cached ? "キャッシュ翻訳" : "翻訳完了");

        } finally {
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }
      };

      script.onerror = function() {
        if (requestId === lastRequestId) {
          translatedText.textContent = "通信エラー";
          setStatus("通信エラー：GASのURLまたは公開設定を確認してください");
        }
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
      };

      script.src =
        GAS_URL +
        "?text=" + encodeURIComponent(textForTranslate) +
        "&target=" + encodeURIComponent(targetLang) +
        "&callback=" + callbackName +
        "&t=" + Date.now();

      document.body.appendChild(script);
    }

    function toggleFullscreen() {
      document.body.classList.add("fullscreenMode");
      const doc = document.documentElement;

      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (doc.requestFullscreen) {
          doc.requestFullscreen().catch(() => {});
        } else if (doc.webkitRequestFullscreen) {
          doc.webkitRequestFullscreen();
        }
      }
    }

    function exitFullscreenMode() {
      document.body.classList.remove("fullscreenMode");

      if (document.fullscreenElement && document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitFullscreenElement && document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      }
    }

    document.addEventListener("fullscreenchange", function() {
      if (!document.fullscreenElement) {
        document.body.classList.remove("fullscreenMode");
      }
    });

    document.addEventListener("webkitfullscreenchange", function() {
      if (!document.webkitFullscreenElement) {
        document.body.classList.remove("fullscreenMode");
      }
    });

    function setStatus(message) {
      statusBox.textContent = message;
    }
  </script>
</body>
</html>

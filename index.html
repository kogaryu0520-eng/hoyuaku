<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多言語翻訳アプリ</title>

<style>
body {
  font-family: system-ui, sans-serif;
  margin: 0;
  padding: 16px;
  background: #f4f4f4;
}

.app {
  max-width: 720px;
  margin: auto;
}

.result {
  background: #111;
  color: #fff;
  padding: 18px;
  border-radius: 14px;
  font-size: 26px;
  line-height: 1.6;
  margin-bottom: 16px;
  min-height: 80px;
  white-space: pre-wrap;
}

textarea {
  width: 100%;
  height: 150px;
  font-size: 20px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

select, button {
  width: 100%;
  font-size: 20px;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
}

button {
  background: #111;
  color: white;
}

.mic {
  background: #0b7;
}

.clear {
  background: #777;
}

.small {
  font-size: 14px;
  color: #666;
  margin-top: 8px;
}
</style>
</head>

<body>
<div class="app">

  <div id="result" class="result">翻訳結果がここに表示されます</div>

  <select id="targetLang">
    <option value="vi">🇻🇳 ベトナム語</option>
    <option value="en">🇺🇸 英語</option>
    <option value="es">🇪🇸 スペイン語</option>
    <option value="pt">🇧🇷 ポルトガル語</option>
    <option value="zh-CN">🇨🇳 中国語</option>
    <option value="id">🇮🇩 インドネシア語</option>
  </select>

  <textarea id="inputText" placeholder="日本語を入力、または音声入力してください"></textarea>

  <button class="mic" onclick="startVoice()">🎤 日本語音声入力</button>
  <button onclick="translateText()">翻訳する</button>
  <button onclick="speakResult()">🔊 読み上げ</button>
  <button class="clear" onclick="clearText()">クリア</button>

  <div class="small">
    音声入力は短く区切ると精度が上がります。例：朝礼を始めます。夕礼で報告してください。
  </div>

</div>

<script>
const GAS_URL = "ここにGASのWebアプリURLを入れてください";

const langVoiceMap = {
  vi: "vi-VN",
  en: "en-US",
  es: "es-ES",
  pt: "pt-BR",
  "zh-CN": "zh-CN",
  id: "id-ID"
};

let recognition;

function normalizeJapanese(text) {
  return text
    .replace(/文字お越し/g, "文字起こし")
    .replace(/幽霊/g, "夕礼")
    .replace(/条例/g, "朝礼")
    .replace(/近ずかない/g, "近づかない")
    .replace(/ヘルメットを着用して下さい/g, "ヘルメットを着用してください")
    .replace(/クレーンが動きます/g, "クレーンが動きます")
    .replace(/図面/g, "図面")
    .replace(/溶接/g, "溶接")
    .replace(/ショット/g, "ショット")
    .replace(/ピッキング/g, "ピッキング")
    .trim();
}

function startVoice() {
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("このブラウザは音声入力に対応していません。Chromeで開いてください。");
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalText = "";

  recognition.onresult = function(event) {
    let interimText = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalText += transcript + "。";
      } else {
        interimText += transcript;
      }
    }

    document.getElementById("inputText").value =
      normalizeJapanese(finalText + interimText);
  };

  recognition.onerror = function(event) {
    alert("音声認識エラー: " + event.error);
  };

  recognition.start();
}

function translateText() {
  const text = normalizeJapanese(document.getElementById("inputText").value);
  const target = document.getElementById("targetLang").value;
  const result = document.getElementById("result");

  if (!text) {
    alert("日本語を入力してください");
    return;
  }

  result.textContent = "翻訳中...";

  const callbackName = "callback_" + Date.now();

  window[callbackName] = function(data) {
    if (data.error) {
      result.textContent = "エラー: " + data.error;
    } else {
      result.textContent = data.translated;
    }

    delete window[callbackName];
    document.body.removeChild(script);
  };

  const script = document.createElement("script");
  script.src =
    GAS_URL +
    "?text=" + encodeURIComponent(text) +
    "&target=" + encodeURIComponent(target) +
    "&callback=" + callbackName;

  document.body.appendChild(script);
}

function speakResult() {
  const text = document.getElementById("result").textContent;
  const target = document.getElementById("targetLang").value;

  if (!text || text === "翻訳結果がここに表示されます") return;

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = langVoiceMap[target] || "en-US";
  utter.rate = 0.9;

  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function clearText() {
  document.getElementById("inputText").value = "";
  document.getElementById("result").textContent = "翻訳結果がここに表示されます";
}
</script>

</body>
</html>

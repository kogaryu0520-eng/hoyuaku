<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>リアルタイム翻訳アプリ</title>

  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }

    .box {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      color: #ccc;
    }

    select {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      margin-top: 8px;
      cursor: pointer;
    }

    .start {
      background: #00c853;
      color: #fff;
    }

    .stop {
      background: #d50000;
      color: #fff;
    }

    .clear {
      background: #555;
      color: #fff;
    }

    .small {
      font-size: 13px;
      color: #aaa;
      line-height: 1.6;
    }

    .result-title {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 8px;
    }

    #translatedText {
      font-size: 28px;
      line-height: 1.6;
      white-space: pre-wrap;
      color: #00e676;
      min-height: 80px;
    }

    #finalText {
      font-size: 20px;
      line-height: 1.6;
      white-space: pre-wrap;
      color: #fff;
      min-height: 60px;
    }

    #interimText {
      font-size: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
      color: #888;
      min-height: 40px;
    }

    .status {
      font-size: 14px;
      color: #ffeb3b;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <h1>リアルタイム翻訳</h1>

  <div class="box">
    <label for="targetLang">翻訳先</label>
    <select id="targetLang">
      <option value="vi">🇻🇳 ベトナム語</option>
      <option value="en">🇺🇸 英語</option>
      <option value="es">🇪🇸 スペイン語</option>
      <option value="pt">🇧🇷 ポルトガル語</option>
      <option value="zh-CN">🇨🇳 中国語</option>
      <option value="id">🇮🇩 インドネシア語</option>
    </select>

    <button id="startBtn" class="start">音声認識スタート</button>
    <button id="stopBtn" class="stop">ストップ</button>
    <button id="clearBtn" class="clear">クリア</button>

    <div id="status" class="status">待機中</div>

    <p class="small">
      精度を上げるコツ：ゆっくり・短く・一文ずつ話してください。<br>
      途中の文字ではなく、確定した日本語だけを翻訳します。
    </p>
  </div>

  <div class="box">
    <div class="result-title">翻訳結果</div>
    <div id="translatedText"></div>
  </div>

  <div class="box">
    <div class="result-title">日本語 確定文字</div>
    <div id="finalText"></div>
  </div>

  <div class="box">
    <div class="result-title">日本語 認識中</div>
    <div id="interimText"></div>
  </div>

  <script>
    const GAS_URL = "ここにGASのURLを入れてください";

    let recognition;
    let isRecognizing = false;
    let finalTextAll = "";
    let lastTranslatedText = "";

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const clearBtn = document.getElementById("clearBtn");

    const targetLang = document.getElementById("targetLang");
    const statusEl = document.getElementById("status");
    const translatedTextEl = document.getElementById("translatedText");
    const finalTextEl = document.getElementById("finalText");
    const interimTextEl = document.getElementById("interimText");

    const SpeechRecognition =
      window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      statusEl.textContent = "このブラウザは音声認識に対応していません。Google Chromeを使ってください。";
      startBtn.disabled = true;
    } else {
      recognition = new SpeechRecognition();

      recognition.lang = "ja-JP";
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 3;

      recognition.onstart = function () {
        isRecognizing = true;
        statusEl.textContent = "音声認識中";
      };

      recognition.onend = function () {
        isRecognizing = false;
        statusEl.textContent = "停止中";

        // Chrome対策：意図せず止まった場合は自動再開
        if (startBtn.dataset.active === "true") {
          setTimeout(() => {
            try {
              recognition.start();
            } catch (e) {}
          }, 500);
        }
      };

      recognition.onerror = function (event) {
        statusEl.textContent = "音声認識エラー：" + event.error;
      };

      recognition.onresult = function (event) {
        let interimText = "";
        let confirmedText = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
          let transcript = event.results[i][0].transcript;

          if (event.results[i].isFinal) {
            confirmedText += transcript;
          } else {
            interimText += transcript;
          }
        }

        interimTextEl.textContent = interimText;

        if (confirmedText.trim() !== "") {
          finalTextAll += confirmedText + "\n";
          finalTextEl.textContent = finalTextAll;

          translateText(confirmedText);
        }
      };
    }

    startBtn.addEventListener("click", function () {
      if (!recognition) return;

      startBtn.dataset.active = "true";

      if (!isRecognizing) {
        try {
          recognition.start();
        } catch (e) {}
      }
    });

    stopBtn.addEventListener("click", function () {
      startBtn.dataset.active = "false";

      if (recognition && isRecognizing) {
        recognition.stop();
      }

      statusEl.textContent = "停止しました";
    });

    clearBtn.addEventListener("click", function () {
      finalTextAll = "";
      lastTranslatedText = "";
      finalTextEl.textContent = "";
      interimTextEl.textContent = "";
      translatedTextEl.textContent = "";
      statusEl.textContent = "クリアしました";
    });

    targetLang.addEventListener("change", function () {
      translatedTextEl.textContent = "";
      lastTranslatedText = "";

      if (finalTextAll.trim() !== "") {
        translateText(finalTextAll);
      }
    });

    function translateText(text) {
      if (!text || text.trim() === "") return;

      const lang = targetLang.value;
      const callbackName = "callback_" + Date.now();

      statusEl.textContent = "翻訳中...";

      window[callbackName] = function (data) {
        try {
          if (data.error) {
            statusEl.textContent = "翻訳エラー：" + data.error;
          } else {
            if (text === finalTextAll) {
              lastTranslatedText = data.translated;
            } else {
              lastTranslatedText += data.translated + "\n";
            }

            translatedTextEl.textContent = lastTranslatedText;
            statusEl.textContent = "翻訳完了";
          }
        } finally {
          delete window[callbackName];
          script.remove();
        }
      };

      const script = document.createElement("script");

      script.src =
        GAS_URL +
        "?text=" + encodeURIComponent(text) +
        "&target=" + encodeURIComponent(lang) +
        "&callback=" + callbackName;

      document.body.appendChild(script);
    }
  </script>

</body>
</html>

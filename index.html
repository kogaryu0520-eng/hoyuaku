<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>リアルタイム多言語翻訳</title>
  <style>
    :root {
      --bg: #000;
      --panel: #111827;
      --button: #1f2937;
      --active: #ffffff;
      --text: #ffffff;
      --muted: #9ca3af;
      --green: #22c55e;
      --red: #ef4444;
      --border: #374151;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .screen {
      height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .display {
      display: grid;
      grid-template-rows: 2fr 1fr; /* 上2/3：翻訳後、下1/3：日本語 */
      height: 100%;
      background: #000;
    }

    .box {
      padding: 28px 5vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      word-break: break-word;
      overflow: hidden;
    }

    .box:first-child {
      border-right: none;
      border-bottom: 2px solid #333;
    }

    .label {
      color: var(--muted);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    #sourceText {
      font-size: clamp(28px, 5.2vw, 58px);
      line-height: 1.3;
      font-weight: 750;
      color: #e5e7eb;
      overflow-wrap: anywhere;
    }

    #translatedText {
      font-size: clamp(44px, 8vw, 96px);
      line-height: 1.18;
      font-weight: 850;
      color: #ffffff;
      overflow-wrap: anywhere;
    }

    .controlPanel {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .languageButtons {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 800;
      font-size: 16px;
      padding: 14px 8px;
      background: var(--button);
      cursor: pointer;
    }

    .languageButtons button.active {
      background: var(--active);
      color: #111827;
    }

    .mainButtons {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 8px;
    }

    #startBtn {
      background: var(--green);
      font-size: 22px;
    }

    #startBtn.recording {
      background: var(--red);
      animation: pulse 1s infinite;
    }

    .stop {
      background: var(--red);
    }

    .fullscreen {
      background: #374151;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }


    #exitFullscreenBtn {
      display: none;
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      background: rgba(255,255,255,0.92);
      color: #111827;
      border: none;
      border-radius: 999px;
      font-weight: 900;
      font-size: 20px;
      padding: 16px 24px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    }

    body.fullscreenMode #exitFullscreenBtn {
      display: block;
    }

    #sourceText.compact {
      font-size: clamp(22px, 4.2vw, 44px);
    }

    #sourceText.tiny {
      font-size: clamp(18px, 3.2vw, 34px);
      line-height: 1.22;
    }

    #translatedText.compact {
      font-size: clamp(34px, 6.2vw, 72px);
    }

    #translatedText.tiny {
      font-size: clamp(26px, 4.8vw, 54px);
      line-height: 1.15;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 rgba(239,68,68,0.5); }
      50% { box-shadow: 0 0 26px rgba(239,68,68,0.7); }
      100% { box-shadow: 0 0 0 rgba(239,68,68,0.5); }
    }

    body.fullscreenMode .controlPanel {
      display: none;
    }

    body.fullscreenMode .screen {
      grid-template-rows: 1fr;
    }

    @media screen and (orientation: portrait) {
      .box {
        padding: 24px 5vw;
      }

      .label {
        font-size: 22px;
        margin-bottom: 14px;
      }

      #sourceText {
        font-size: clamp(26px, 8vw, 46px);
      }

      #translatedText {
        font-size: clamp(40px, 11vw, 72px);
      }

      .languageButtons {
        grid-template-columns: repeat(3, 1fr);
      }

      .mainButtons {
        grid-template-columns: 1fr 1fr;
      }

      .fullscreen {
        grid-column: span 2;
      }
    }

    @media screen and (max-width: 700px) {
      button {
        font-size: 14px;
        padding: 12px 6px;
      }

      #startBtn {
        font-size: 18px;
      }
    }
  </style>
</head>

        <button class="fullscreen" onclick="toggleFullscreen()">全画面</button>
      </div>

      <div class="status" id="status">待機中</div>
    </section>
  </div>

      "玉掛け": {"vi":"móc cáp cẩu","en":"slinging work","es":"trabajo de eslingado","pt":"trabalho de lingamento","zh-CN":"吊装挂钩作业","id":"pekerjaan rigging"},

      "介錯ロープ": {"vi":"dây điều hướng tải","en":"tag line","es":"cuerda guía","pt":"corda guia","zh-CN":"牵引绳","id":"tali pengarah"},
      "フルハーネス": {"vi":"dây đai an toàn toàn thân","en":"full-body harness","es":"arnés de cuerpo completo","pt":"cinturão tipo paraquedista","zh-CN":"全身式安全带","id":"full body harness"},
      "出来高": {"vi":"khối lượng hoàn thành","en":"work progress quantity","es":"cantidad de avance","pt":"quantidade produzida","zh-CN":"完成工程量","id":"jumlah hasil pekerjaan"}
    };

    function applyTermPlaceholders(text) {
      const replacements = [];
      let protectedText = String(text || "");
      const terms = Object.keys(STEEL_TERM_TRANSLATIONS).sort((a, b) => b.length - a.length);

      terms.forEach((term, index) => {
        if (protectedText.includes(term)) {
          const placeholder = " KOGA_TERM_" + index + " ";
          protectedText = protectedText.split(term).join(placeholder);
          replacements.push({ placeholder: placeholder.trim(), term: term });
        }
      });

      return { text: protectedText, replacements: replacements };
    }

    function restoreTermPlaceholders(translated, replacements) {
      let result = String(translated || "");

      replacements.forEach(item => {
        const target = STEEL_TERM_TRANSLATIONS[item.term]?.[targetLang] || item.term;
        const patterns = [
          item.placeholder,
          item.placeholder.toLowerCase(),
          item.placeholder.replaceAll("_", " "),
          item.placeholder.toLowerCase().replaceAll("_", " ")
        ];

        patterns.forEach(pattern => {
          result = result.split(pattern).join(target);
        });
      });

      return result.replace(/\s+/g, " ").trim();
    }

    function fitDisplayText() {
      const sourceLength = sourceText.textContent.length;
      const translatedLength = translatedText.textContent.length;

      sourceText.classList.remove("compact", "tiny");
      translatedText.classList.remove("compact", "tiny");

      if (sourceLength > 45) sourceText.classList.add("compact");
      if (sourceLength > 90) sourceText.classList.add("tiny");

      if (translatedLength > 55) translatedText.classList.add("compact");
      if (translatedLength > 110) translatedText.classList.add("tiny");
    }

    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        setStatus("このブラウザは音声入力に対応していません。iPadのSafari、またはChromeで試してください。");
        return null;
      }

      const rec = new SpeechRecognition();
      rec.lang = "ja-JP";
      rec.continuous = true;
      rec.interimResults = true;

      rec.onstart = function() {
        recognizing = true;
        startBtn.classList.add("recording");
        startBtn.textContent = "🎙 入力中";
        setStatus("音声入力中");
      };

      rec.onend = function() {
        recognizing = false;

        if (desiredRunning) {
          setStatus("音声入力を自動再開中...");
          setTimeout(function() {
            try {
              rec.start();
            } catch (err) {
              setStatus("自動再開エラー：" + err.message);
            }
          }, 500);
          return;
        }

        startBtn.classList.remove("recording");
        startBtn.textContent = "🎙 リアルタイム開始";
        setStatus("停止中");
      };

      rec.onerror = function(event) {
        setStatus("音声入力エラー：" + event.error);
      };

      rec.onresult = function(event) {
        let interimText = "";
        let finalText = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;

          if (event.results[i].isFinal) {
            finalText += transcript;
          } else {
            interimText += transcript;
          }
        }

        if (interimText) {
          sourceText.textContent = correctJapaneseText(interimText);
          translatedText.textContent = "翻訳中...";
          fitDisplayText();
        }

        if (finalText) {
          finalText = correctJapaneseText(finalText.trim());

          if (!finalText || finalText === lastFinalText) return;

          lastFinalText = finalText;
          sourceText.textContent = finalText;
          fitDisplayText();

          const now = Date.now();
          if (now - lastTranslateAt > 500) {
            lastTranslateAt = now;
            translateText(finalText);
          }
        }
      };

      return rec;
    }

    function startMic() {
      desiredRunning = true;

      if (!recognition) {
        recognition = setupSpeechRecognition();
      }

      if (!recognition) return;

      try {
        if (!recognizing) recognition.start();
      } catch (err) {
        setStatus("音声開始エラー：" + err.message);
      }
    }

    function stopMic() {
      desiredRunning = false;

      if (recognition && recognizing) {
        recognition.stop();
      } else {
        startBtn.classList.remove("recording");
        startBtn.textContent = "🎙 リアルタイム開始";
        setStatus("停止中");
      }
    }

    function translateText(text) {
      if (!GAS_URL || GAS_URL.includes("ここにGAS")) {
        translatedText.textContent = "GAS_URLを設定してください";
        setStatus("GAS_URLを設定してください");
        return;
      }

      translatedText.textContent = "翻訳中...";
      fitDisplayText();
      setStatus("翻訳中");

      const protectedData = applyTermPlaceholders(text);
      const textForTranslate = protectedData.text;

      const callbackName = "callback_" + Date.now() + "_" + Math.floor(Math.random() * 10000);

      window[callbackName] = function(data) {
        try {
          if (data.error) {
            translatedText.textContent = "翻訳エラー";
            setStatus("翻訳エラー：" + data.error);
            return;
          }

          const restored = restoreTermPlaceholders(data.translated || "", protectedData.replacements);
          translatedText.textContent = restored || "翻訳結果なし";
          fitDisplayText();
          setStatus("翻訳完了");

        } finally {
          delete window[callbackName];
          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      };

      const script = document.createElement("script");

      script.onerror = function() {
        translatedText.textContent = "通信エラー";
        setStatus("通信エラー：GASのURLまたは公開設定を確認してください");
        delete window[callbackName];
        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }
      };

      script.src =
        GAS_URL +
        "?text=" + encodeURIComponent(textForTranslate) +
        "&target=" + encodeURIComponent(targetLang) +
        "&callback=" + callbackName +
        "&t=" + Date.now();

      document.body.appendChild(script);
    }

    function toggleFullscreen() {
      document.body.classList.add("fullscreenMode");

      const doc = document.documentElement;

      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (doc.requestFullscreen) {
          doc.requestFullscreen().catch(() => {});
        } else if (doc.webkitRequestFullscreen) {
          doc.webkitRequestFullscreen();
        }
      }
    }

    function exitFullscreenMode() {
      document.body.classList.remove("fullscreenMode");

      if (document.fullscreenElement && document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitFullscreenElement && document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      }
    }

    document.addEventListener("fullscreenchange", function() {
      if (!document.fullscreenElement) {
        document.body.classList.remove("fullscreenMode");
      }
    });

    document.addEventListener("webkitfullscreenchange", function() {
      if (!document.webkitFullscreenElement) {
        document.body.classList.remove("fullscreenMode");
      }
    });

    function setStatus(message) {
      statusBox.textContent = message;
    }
  </script>
